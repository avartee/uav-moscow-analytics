<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СВОДКА ГШ: Аналитика атак БПЛА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .map-container { min-height: 600px; border: 1px solid #334155; }
        .past-hit { background-color: #ef4444; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; }
        .new-hit { background-color: #3b82f6; width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff; }
        .future-hit { background-color: #f59e0b; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body class="font-sans antialiased p-4">
<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
        <div id="map" class="map-container rounded bg-slate-900"></div>
    </div>
    <div class="bg-slate-800 rounded-lg p-5 border border-slate-700 h-[600px] overflow-y-auto">
        <h3 class="text-lg font-bold mb-4 text-white">Статус инцидентов (с 01.05.2026)</h3>
        <div id="incident-list" class="space-y-3"></div>
    </div>
</div>

<script>
    const map = L.map('map').setView([55.50, 37.70], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const today = new Date("2026-07-20T16:58:00Z");
    const dayAgo = new Date(today - 24 * 60 * 60 * 1000);

    // Данные для примера
    const incidents = [
        { name: "Инцидент Химки", date: "2026-05-17T12:00:00Z", coords: [55.918, 37.433] },
        { name: "Свежий удар Подольск", date: "2026-07-20T10:00:00Z", coords: [55.321, 37.545] }
    ];

    const listContainer = document.getElementById('incident-list');

    incidents.forEach(inc => {
        const eventDate = new Date(inc.date);
        let className = 'past-hit';
        let borderColor = 'border-red-500';

        if (eventDate > dayAgo && eventDate <= today) {
            className = 'new-hit';
            borderColor = 'border-blue-500';
        }

        if (eventDate >= new Date("2026-05-01")) {
            L.marker(inc.coords, {icon: L.divIcon({className: className})})
             .bindTooltip(inc.name).addTo(map);
            
            listContainer.innerHTML += `<div class="p-3 bg-slate-900 border-l-4 ${borderColor} rounded text-sm">
                <strong>${inc.name}</strong><br>Дата: ${inc.date.split('T')[0]}
            </div>`;
        }
    });
</script>
</body>
</html>
