<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сводка ГШ: БПЛА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .past-hit { background-color: #ef4444; width: 12px; height: 12px; border-radius: 50%; }
        .new-hit { background-color: #3b82f6; width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 0 10px #3b82f6; }
    </style>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="new-list" class="mb-4 space-y-2"></div>
    <div id="map" class="h-[600px] w-full rounded"></div>
    <script>
        var map = L.map('map').setView([55.50, 37.80], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        fetch('./data.json?' + new Date().getTime()).then(r => r.json()).then(data => {
            const now = new Date();
            data.pastIncidents.forEach(p => {
                const added = p.added_at ? new Date(p.added_at) : new Date(0);
                const isNew = (now - added) < (24 * 60 * 60 * 1000); // Меньше суток
                
                const icon = L.divIcon({className: isNew ? 'new-hit' : 'past-hit', iconSize: [16,16]});
                L.marker(p.coords, {icon: icon}).bindTooltip(p.name).addTo(map);

                if(isNew) {
                    document.getElementById('new-list').innerHTML += `<div class="bg-blue-900 p-2 rounded">НОВОЕ: ${p.name} - ${p.details}</div>`;
                }
            });
        });
    </script>
</body>
</html>
