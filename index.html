<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика атак БПЛА</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .map-container { min-height: 600px; z-index: 10; border: 1px solid #334155; }
        
        /* Маркеры карты */
        .past-hit { background-color: #ef4444; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 5px rgba(239, 68, 68, 0.8); }
        .new-hit { background-color: #3b82f6; width: 16px; height: 16px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 12px rgba(59, 130, 246, 0.9); animation: pulse-blue 1.5s infinite; }
        .future-hit { background-color: #f59e0b; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 10px rgba(245, 158, 11, 0.8); }
        
        @keyframes pulse-blue { 
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); } 
            70% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="font-sans antialiased p-4">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex justify-between items-end border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-white uppercase tracking-wide">
                    <i class="fa-solid fa-crosshairs text-red-500 mr-2"></i> Сводка ГШ
                </h1>
                <p class="text-sm text-slate-400 mt-1">Аналитика инцидентов и прогноз угроз (с 01.05.2026)</p>
            </div>
            <div class="text-xs text-slate-500" id="current-time-display"></div>
        </header>

        <!-- Блок новых событий (СИНИЙ) -->
        <div id="new-alerts-banner" class="hidden mb-6 bg-blue-900/20 border border-blue-500/50 rounded-lg p-5 shadow-[0_0_15px_rgba(59,130,246,0.15)]">
            <h2 class="text-lg font-bold text-blue-400 mb-3 flex items-center">
                <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded mr-3 animate-pulse">ОПЕРАТИВНО</span>
                НОВЫЕ ИНЦИДЕНТЫ (24 ЧАСА)
            </h2>
            <ul id="new-alerts-list" class="space-y-2 text-sm text-slate-200"></ul>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div id="map" class="map-container rounded-lg bg-slate-900 shadow-lg"></div>
            </div>
            
            <div class="flex flex-col gap-6">
                <!-- Блок истории (КРАСНЫЙ) -->
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700 overflow-y-auto custom-scroll flex-1 max-h-[280px]">
                    <h3 class="text-md font-bold mb-3 text-red-400 border-b border-slate-700 pb-2">Атаки в районе Жуковского</h3>
                    <div id="history-list" class="space-y-2 text-sm"></div>
                </div>

                <!-- Блок прогнозов (ОРАНЖЕВЫЙ) -->
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700 overflow-y-auto custom-scroll flex-1 max-h-[295px]">
                    <h3 class="text-md font-bold mb-3 text-orange-400 border-b border-slate-700 pb-2">Следующие возможные цели</h3>
                    <ol id="forecast-list" class="space-y-2 text-sm pr-2"></ol>
                </div>
            </div>
        </div>
    </div>

<script>
    // Инициализация карты
    const map = L.map('map').setView([55.60, 37.70], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    document.getElementById('current-time-display').innerText = `Системное время: ${new Date().toLocaleDateString('ru-RU')}`;

    // Функция парсинга дат из формата "DD.MM" в полноценный объект Date (2026 год)
    function parseIncidentDate(dateStr, addedAt) {
        if (addedAt) return new Date(addedAt);
        if (!dateStr) return new Date(0);
        
        const parts = dateStr.split('.');
        if (parts.length === 2) {
            // Формат DD.MM. Подставляем 2026 год.
            return new Date(`2026-${parts[1]}-${parts[0]}T12:00:00Z`);
        }
        return new Date(dateStr);
    }

    function renderData(data) {
        const now = new Date();
        const MAY_FIRST_2026 = new Date("2026-05-01T00:00:00Z");
        const ONE_DAY_MS = 24 * 60 * 60 * 1000;

        const historyList = document.getElementById('history-list');
        const forecastList = document.getElementById('forecast-list');
        const newAlertsBanner = document.getElementById('new-alerts-banner');
        const newAlertsList = document.getElementById('new-alerts-list');

        let hasNewAlerts = false;

        // 1. Отрисовка произошедших инцидентов (Красные / Синие)
        data.pastIncidents.forEach(inc => {
            const eventDate = parseIncidentDate(inc.date, inc.added_at);
            
            // Проверка: это новое событие за последние 24 часа?
            let isNew = false;
            if (inc.added_at) {
                const addedTime = new Date(inc.added_at);
                isNew = (now.getTime() - addedTime.getTime()) <= ONE_DAY_MS;
            }

            // Проверка: это история с 1 мая по сегодня?
            const isHistorical = (eventDate >= MAY_FIRST_2026 && eventDate <= now);

            if (isNew) {
                // Синий маркер для новых
                L.marker(inc.coords, {icon: L.divIcon({className: 'new-hit', iconSize: [16,16]})})
                 .bindTooltip(`<b>НОВОЕ:</b> ${inc.name}`)
                 .addTo(map);
                
                hasNewAlerts = true;
                newAlertsList.innerHTML += `
                    <li class="bg-blue-950/40 p-2 rounded border-l-2 border-blue-500">
                        <span class="font-bold text-white">${inc.name}</span> <span class="text-xs text-blue-300 ml-2">(${inc.date})</span>
                        <p class="text-xs text-slate-300 mt-1">${inc.details || ''}</p>
                    </li>`;
            } else if (isHistorical) {
                // Красный маркер для истории
                L.marker(inc.coords, {icon: L.divIcon({className: 'past-hit', iconSize: [12,12]})})
                 .bindTooltip(`<b>${inc.name}</b><br>${inc.date}`)
                 .addTo(map);
                
                historyList.innerHTML += `
                    <div class="p-2 mb-2 bg-slate-900/50 rounded border-l-2 border-red-500">
                        <strong>${inc.name}</strong> <span class="text-xs text-slate-400">(${inc.date})</span>
                        <div class="text-xs text-slate-400 mt-1">${inc.details || ''}</div>
                    </div>`;
            }
        });

        if (hasNewAlerts) {
            newAlertsBanner.classList.remove('hidden');
        }

        // 2. Отрисовка прогнозируемых целей (Оранжевые)
        data.forecastTargets.forEach((f, index) => {
            L.marker(f.coords, {icon: L.divIcon({className: 'future-hit', iconSize: [14,14]})})
             .bindTooltip(`<b>ЦЕЛЬ ${index+1}:</b> ${f.name}`)
             .addTo(map);
            
            forecastList.innerHTML += `
                <li class="p-2 mb-2 bg-slate-700/20 rounded border-l-2 border-orange-500">
                    <div class="flex items-start">
                        <span class="text-orange-500 font-bold mr-2">${index+1}.</span>
                        <div>
                            <strong class="text-slate-200">${f.name}</strong>
                            <p class="text-xs text-slate-400 leading-tight mt-1">${f.desc}</p>
                        </div>
                    </div>
                </li>`;
        });
    }

    // Жестко зашитые данные для 100% гарантии работы в Preview-окне
    const FULL_DATA = {
      "pastIncidents": [
        { "name": "Химки (Частный сектор)", "date": "17.05", "coords": [55.918, 37.433], "details": "Разведка, падение обломков." },
        { "name": "Мытищи (Промзона)", "date": "17.05", "coords": [55.912, 37.683], "details": "Вскрытие ПВО." },
        { "name": "МНПЗ (Капотня)", "date": "18.06", "coords": [55.638, 37.795], "details": "Попадание в установку." },
        { "name": "Жуковский (ул. Гагарина)", "date": "18.06", "coords": [55.605, 38.096], "details": "Попадание в жилой фонд." },
        { "name": "Раменское (Высоковольтная)", "date": "18.06", "coords": [55.571, 38.225], "details": "Пожар в многоэтажке." },
        { "name": "Лыткарино (Тураево)", "date": "18.06", "coords": [55.578, 37.906], "details": "Падение обломков." },
        { "name": "Люберцы (Садовод)", "date": "18.06", "coords": [55.653, 37.825], "details": "Удар по коммерческому узлу." },
        { "name": "Котельники", "date": "18.06", "coords": [55.660, 37.860], "details": "Повреждение жилого массива." },
        { "name": "Атака БПЛА (Подольский сектор)", "date": "20.07", "coords": [55.321, 37.545], "added_at": "2026-07-20T10:00:00Z", "details": "Массированный налет 20.07.2026. Попадание в логистический объект." }
      ],
      "forecastTargets": [
        { "name": "ЛПДС «Володарская»", "desc": "Критический узел авиатоплива (ЮВ).", "coords": [55.498, 37.944] },
        { "name": "Ж/Д узел Бекасово", "desc": "Крупнейший ж/д узел на Юго-Западе.", "coords": [55.425, 36.836] },
        { "name": "ТЛЦ Белый Раст", "desc": "Крупный контейнерный хаб (Север).", "coords": [56.136, 37.472] },
        { "name": "ИП Софьино", "desc": "Логопарк (Раменский г.о., Юго-Восток).", "coords": [55.495, 38.148] },
        { "name": "Аэродром Чкаловский", "desc": "Военная логистика, спецборты.", "coords": [55.880, 38.055] },
        { "name": "ТЭЦ-27 (Северная)", "desc": "Мытищи. Угроза дестабилизации энергосети.", "coords": [55.912, 37.683] },
        { "name": "Авиабаза Кубинка", "desc": "Западное направление. Вскрытие ПВО.", "coords": [55.611, 36.648] },
        { "name": "НПП Звезда (Томилино)", "desc": "Предприятие ВПК (авиация, космос).", "coords": [55.648, 37.946] },
        { "name": "Склады Ozon Хоругвино", "desc": "Коммерческая логистика (Солнечногорск).", "coords": [56.126, 37.198] },
        { "name": "ПНК Парк Валищево", "desc": "Подольск. Южный складской кластер.", "coords": [55.334, 37.671] },
        { "name": "ТЭЦ-22 (Дзержинский)", "desc": "Энергетика юго-восточного сектора.", "coords": [55.632, 37.846] },
        { "name": "ЛИИ им. Громова", "desc": "Жуковский. Аэродром и испытания.", "coords": [55.568, 38.136] },
        { "name": "Нефтебаза Гривно", "desc": "Климовск/Подольск. Топливо юга.", "coords": [55.372, 37.525] },
        { "name": "Аэродром Остафьево", "desc": "Новая Москва. Авиационная инфраструктура.", "coords": [55.510, 37.506] },
        { "name": "Логопарк Быково", "desc": "Раменский ГО. Крупные склады.", "coords": [55.626, 38.067] },
        { "name": "РКК Энергия", "desc": "Королев. Стратегическое предприятие ВПК.", "coords": [55.922, 37.811] },
        { "name": "Ж/Д ст. Орехово-Зуево", "desc": "Крупнейший сортировочный узел востока.", "coords": [55.795, 38.980] },
        { "name": "Каширская ГРЭС", "desc": "Мощный энергоузел на южных подступах.", "coords": [54.856, 38.257] },
        { "name": "ИП Коледино", "desc": "Подольск. Хаб WB/Ozon.", "coords": [55.390, 37.585] },
        { "name": "ТЛЦ Электроугли", "desc": "Контейнерный терминал восточного вектора.", "coords": [55.723, 38.204] },
        { "name": "ТЭЦ-26 (Бирюлево)", "desc": "Энергетика юга Москвы.", "coords": [55.586, 37.640] },
        { "name": "МКБ Факел", "desc": "Химки. Производство систем ПВО.", "coords": [55.894, 37.441] },
        { "name": "Внуково-Логистик", "desc": "Марушкинское. Складская артерия.", "coords": [55.584, 37.228] },
        { "name": "Шатурская ГРЭС", "desc": "Стратегическая электрогенерация (восток).", "coords": [55.582, 39.544] },
        { "name": "Нефтебаза Павельцево", "desc": "Долгопрудный. Топливный хаб севера.", "coords": [55.975, 37.495] },
        { "name": "ГКС Воскресенск", "desc": "Ключевая газовая компрессорная станция.", "coords": [55.334, 38.647] },
        { "name": "Аэродром Ступино", "desc": "Транспортная цель на южном векторе.", "coords": [54.894, 38.140] },
        { "name": "Чехов-Логистик", "desc": "Склады на стратегическом рубеже Юга.", "coords": [55.150, 37.464] },
        { "name": "КБ Машиностроения", "desc": "Коломна. ВПК (ракетные комплексы).", "coords": [55.087, 38.775] },
        { "name": "ТЭЦ-21", "desc": "Крупнейшая ТЭЦ севера.", "coords": [55.882, 37.525] }
      ]
    };

    // Пытаемся загрузить внешний файл. Если не выходит (из-за песочницы Preview), используем зашитые данные.
    fetch('./data.json')
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => renderData(data))
        .catch(err => {
            console.log("Fetch failed, using integrated fallback data for Preview mode.");
            renderData(FULL_DATA);
        });

</script>
</body>
</html>
