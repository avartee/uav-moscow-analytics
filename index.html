<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СВОДКА ГШ: Аналитика атак БПЛА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .map-container { min-height: 550px; z-index: 10; border: 1px solid #334155; }
        .past-hit { background-color: #ef4444; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 5px rgba(239, 68, 68, 0.8); }
        .pulse-warn { background-color: #f59e0b; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 10px rgba(245, 158, 11, 0.8); animation: pulse-orange 2s infinite; }
        .new-hit { background-color: #3b82f6; width: 16px; height: 16px; border-radius: 50%; border: 2px solid #0f172a; box-shadow: 0 0 12px rgba(59, 130, 246, 0.9); animation: pulse-blue 1.5s infinite; }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); } 70% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="font-sans antialiased">
<div class="max-w-7xl mx-auto px-4 py-8">
    <div id="new-alerts-banner" class="hidden mb-8 bg-blue-900/30 border border-blue-500/50 rounded-lg p-5 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
        <h2 class="text-lg font-bold text-blue-400 mb-3">НОВОЕ ЗА СУТКИ</h2>
        <ul id="new-alerts-list" class="space-y-3 text-sm text-slate-300"></ul>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <div id="map" class="map-container rounded bg-slate-900"></div>
        </div>
        <div class="bg-slate-800 rounded-lg p-5 border border-slate-700 overflow-y-auto custom-scroll" style="max-height: 550px;">
            <h3 class="text-lg font-bold mb-3 text-orange-400">ИИ-Прогноз целей</h3>
            <ol id="forecast-list" class="space-y-3 text-sm pr-2"></ol>
        </div>
    </div>
</div>

<script>
    const FALLBACK_DATA = {
        "pastIncidents": [{"name": "Московский НПЗ", "coords": [55.638, 37.795], "date": "18.06"}, {"name": "Склад WB", "coords": [55.321, 37.545], "date": "20.07", "added_at": "2026-07-20T10:00:00Z"}],
        "forecastTargets": [{"name": "ЛПДС Володарская", "coords": [55.498, 37.944], "desc": "Авиатопливо"}]
    };

    var map = L.map('map').setView([55.50, 37.80], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function initMap(data) {
        const now = new Date();
        data.pastIncidents.forEach(p => {
            const addedTime = p.added_at ? new Date(p.added_at) : new Date(0);
            const isNew = (now - addedTime) <= 86400000;
            const icon = L.divIcon({className: isNew ? 'new-hit' : 'past-hit', iconSize: [16,16], iconAnchor: [8,8]});
            L.marker(p.coords, {icon: icon}).bindTooltip(p.name).addTo(map);
            if(isNew) {
                document.getElementById('new-alerts-banner').classList.remove('hidden');
                document.getElementById('new-alerts-list').innerHTML += `<li>${p.name}</li>`;
            }
        });
        data.forecastTargets.forEach((f, i) => {
            L.marker(f.coords, {icon: L.divIcon({className: 'pulse-warn', iconSize: [14,14], iconAnchor: [7,7]})}).addTo(map);
            document.getElementById('forecast-list').innerHTML += `<li class="text-xs">${i+1}. ${f.name}</li>`;
        });
    }

    fetch('data.json').then(r => r.json()).then(d => initMap(d)).catch(e => {
        console.warn("Fetch failed, using fallback data");
        initMap(FALLBACK_DATA);
    });
</script>
</body>
</html>
